name: .NET and Docker

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    # 检出代码 
    - uses: actions/checkout@v4

    # 设置 .NET 环境
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    # 确定版本号  
    - name: Read project version
      id: get-version
      run: |
        version=$(grep -oPm1 '(?<=<InformationalVersion>).*?(?=</InformationalVersion>)' CtYun/CtYun.csproj)
        if [ -z "$version" ]; then
          echo "Error: Unable to read version from CtYun.csproj"
          exit 1
        fi
        echo "version=$version" >> $GITHUB_OUTPUT
        echo "Version: $version"
    # 恢复依赖
    - name: Restore dependencies
      run: dotnet restore

    # 构建应用程序
    - name: Build
      run: dotnet build --no-restore --configuration Release

    # 发布 Linux 二进制（单文件）
    - name: Publish Linux Binary
      run: dotnet publish CtYun/CtYun.csproj -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -p:PublishAot=false -o publish/linux-x64

    # 打包 Linux 二进制构建产物
    - name: Pack Linux Binary
      run: |
        tar -czf ctyun-linux-x64-${{ steps.get-version.outputs.version }}.tar.gz -C publish/linux-x64 CtYun

    # 上传 Linux 二进制构建产物
    - name: Upload Linux Binary Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ctyun-linux-x64-${{ steps.get-version.outputs.version }}
        path: ctyun-linux-x64-${{ steps.get-version.outputs.version }}.tar.gz

    # 登录 Docker Hub
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 设置 Buildx
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      with:
        driver: docker-container

    # 构建和推送多架构 Docker 镜像
    - name: Build and Push Multi-Arch Docker Image
      run: |
        docker buildx build \
          --no-cache \
          --platform linux/amd64,linux/arm64 \
          -t ${{ secrets.DOCKER_USERNAME }}/ctyun:${{ steps.get-version.outputs.version }} \
          -t ${{ secrets.DOCKER_USERNAME }}/ctyun:latest \
          -f ./CtYun/Dockerfile \
          --push .
