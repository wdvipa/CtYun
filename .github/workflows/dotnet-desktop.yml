name: .NET、Release 与 Docker

on:
  push:
    branches: [ "master" ]
    tags:
      - "v*"
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-binaries:
    name: 编译 ${{ matrix.rid }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            archive_name: ctyun-linux-x64
          - rid: linux-arm
            archive_name: ctyun-linux-arm
          - rid: linux-arm64
            archive_name: ctyun-linux-arm64
          - rid: win-x64
            archive_name: ctyun-win-x64
          - rid: win-arm64
            archive_name: ctyun-win-arm64

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: 读取项目版本
        id: get-version
        shell: bash
        run: |
          version=$(grep -oPm1 '(?<=<InformationalVersion>).*?(?=</InformationalVersion>)' CtYun/CtYun.csproj)
          if [ -z "$version" ]; then
            echo "Error: Unable to read version from CtYun.csproj"
            exit 1
          fi
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "Version: $version"

      - name: 恢复依赖
        run: dotnet restore CtYun/CtYun.csproj

      - name: 发布 ${{ matrix.rid }}
        run: dotnet publish CtYun/CtYun.csproj -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishAot=false -p:PublishSingleFile=true -o publish/${{ matrix.rid }}

      - name: 打包 ${{ matrix.rid }}
        shell: bash
        run: |
          tar -czf ${{ matrix.archive_name }}-${{ steps.get-version.outputs.version }}.tar.gz -C publish/${{ matrix.rid }} .

      - name: 上传 ${{ matrix.rid }} 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}-${{ steps.get-version.outputs.version }}
          path: ${{ matrix.archive_name }}-${{ steps.get-version.outputs.version }}.tar.gz

  release:
    name: 发布 GitHub Release
    runs-on: ubuntu-latest
    needs: build-binaries
    if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 下载全部构建产物
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: 整理 Release 文件
        shell: bash
        run: |
          mkdir -p release-files
          find release-artifacts -type f -name '*.tar.gz' -exec cp {} release-files/ \;
          ls -lah release-files

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*.tar.gz
          generate_release_notes: true

  docker:
    name: 构建并推送 Docker 镜像
    runs-on: ubuntu-latest
    needs: build-binaries
    if: github.event_name != 'pull_request'

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: 读取项目版本
        id: get-version
        shell: bash
        run: |
          version=$(grep -oPm1 '(?<=<InformationalVersion>).*?(?=</InformationalVersion>)' CtYun/CtYun.csproj)
          if [ -z "$version" ]; then
            echo "Error: Unable to read version from CtYun.csproj"
            exit 1
          fi
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "Version: $version"

      - name: 为 Docker 构建发布 Linux x64
        run: dotnet publish CtYun/CtYun.csproj -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -p:PublishAot=false -o publish

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建并推送多架构 Docker 镜像
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t ${{ secrets.DOCKER_USERNAME }}/ctyun:${{ steps.get-version.outputs.version }} \
            -t ${{ secrets.DOCKER_USERNAME }}/ctyun:latest \
            -f ./CtYun/Dockerfile \
            --push .
