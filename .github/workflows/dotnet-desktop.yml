name: .NET and Docker

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build-binaries:
    name: Build ${{ matrix.rid }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            archive_name: ctyun-linux-x64
            publish_args: -p:PublishSingleFile=true
          - rid: linux-arm
            archive_name: ctyun-linux-arm
            publish_args: -p:PublishSingleFile=true
          - rid: linux-arm64
            archive_name: ctyun-linux-arm64
            publish_args: -p:PublishSingleFile=true
          - rid: win-x64
            archive_name: ctyun-win-x64
            publish_args: -p:PublishSingleFile=true
          - rid: win-arm64
            archive_name: ctyun-win-arm64
            publish_args: -p:PublishSingleFile=true
          - rid: android-arm64
            archive_name: ctyun-android-arm64
            publish_args: -p:PublishSingleFile=false -p:UseAppHost=true

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Read project version
        id: get-version
        shell: bash
        run: |
          version=$(grep -oPm1 '(?<=<InformationalVersion>).*?(?=</InformationalVersion>)' CtYun/CtYun.csproj)
          if [ -z "$version" ]; then
            echo "Error: Unable to read version from CtYun.csproj"
            exit 1
          fi
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "Version: $version"

      - name: Restore dependencies
        run: dotnet restore CtYun/CtYun.csproj

      - name: Publish ${{ matrix.rid }}
        run: dotnet publish CtYun/CtYun.csproj -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishAot=false ${{ matrix.publish_args }} -o publish/${{ matrix.rid }}

      - name: Pack ${{ matrix.rid }}
        shell: bash
        run: |
          tar -czf ${{ matrix.archive_name }}-${{ steps.get-version.outputs.version }}.tar.gz -C publish/${{ matrix.rid }} .

      - name: Upload ${{ matrix.rid }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}-${{ steps.get-version.outputs.version }}
          path: ${{ matrix.archive_name }}-${{ steps.get-version.outputs.version }}.tar.gz

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: build-binaries
    if: github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Read project version
        id: get-version
        shell: bash
        run: |
          version=$(grep -oPm1 '(?<=<InformationalVersion>).*?(?=</InformationalVersion>)' CtYun/CtYun.csproj)
          if [ -z "$version" ]; then
            echo "Error: Unable to read version from CtYun.csproj"
            exit 1
          fi
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "Version: $version"

      - name: Publish Linux x64 for Docker context
        run: dotnet publish CtYun/CtYun.csproj -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -p:PublishAot=false -o publish

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Multi-Arch Docker Image
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t ${{ secrets.DOCKER_USERNAME }}/ctyun:${{ steps.get-version.outputs.version }} \
            -t ${{ secrets.DOCKER_USERNAME }}/ctyun:latest \
            -f ./CtYun/Dockerfile \
            --push .
